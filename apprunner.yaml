# AWS App Runner deployment config for the AquaAI backend.
# App Runner builds straight from this GitHub repo — no Docker needed.
# Secrets (DATABASE_URL, SECRET_KEY, etc.) are set on the App Runner
# service itself, not committed here.
version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r backend/requirements.txt
run:
  command: bash -c "cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8080"
  network:
    port: 8080
  env:
    - name: UPLOAD_DIR
      value: "uploads"
