name: aquaai_mobile
description: Aqua AI — India's aquaculture intelligence platform, on Android-first Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Camera & imaging
  camera: ^0.10.5+9
  image: ^4.2.0
  image_picker: ^1.1.2

  # On-device AI (TFLite)
  tflite_flutter: ^0.10.4

  # Local database (SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # PDF & QR
  printing: ^5.13.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0

  # PDF display
  flutter_pdfview: ^1.3.2

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # File
  open_filex: ^4.5.1
  share_plus: ^10.0.2

  # GPS
  geolocator: ^13.0.1

  # Text-to-speech for the voice reader (matches the web VoiceReader)
  flutter_tts: ^4.0.2

  # Live weather via Open-Meteo (keyless) — http used directly
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
    - assets/lottie/
  generate: true
