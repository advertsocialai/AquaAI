<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative water-drop on the right -->
  <g opacity="0.18">
    <path
      d="M820 80
         C 920 200, 970 280, 970 340
         C 970 405, 910 450, 820 450
         C 730 450, 670 405, 670 340
         C 670 280, 720 200, 820 80 Z"
      fill="#FFFFFF"/>
  </g>

  <!-- App icon mark, left side -->
  <g transform="translate(80, 130)">
    <rect width="220" height="220" rx="44" fill="#FFFFFF"/>
    <path
      d="M110 35
         C 165 80, 192 122, 192 152
         C 192 184, 156 208, 110 208
         C 64 208, 28 184, 28 152
         C 28 122, 55 80, 110 35 Z"
      fill="#0EA5E9"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(340, 200)">
    <text x="0" y="0" font-family="Helvetica, Arial, sans-serif" font-weight="700"
          font-size="92" fill="#FFFFFF" letter-spacing="-2">Aqua AI</text>
    <text x="0" y="62" font-family="Helvetica, Arial, sans-serif" font-weight="400"
          font-size="32" fill="#E0F2FE">India's aquaculture intelligence platform</text>
    <text x="0" y="110" font-family="Helvetica, Arial, sans-serif" font-weight="500"
          font-size="22" fill="#BAE6FD" letter-spacing="2">DISEASE · WATER · YIELD · CERTIFICATES</text>
  </g>
</svg>
