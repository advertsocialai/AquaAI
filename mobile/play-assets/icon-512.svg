<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="dropShine" cx="0.38" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <!-- Left spear: tapered leaf shape with sharp tip -->
    <path d="M 155 110
             C 122 190, 140 280, 178 332
             L 208 332
             C 196 260, 188 180, 158 105
             Z"
          fill="url(#silver)"/>

    <!-- Right spear: mirror -->
    <path d="M 357 110
             C 390 190, 372 280, 334 332
             L 304 332
             C 316 260, 324 180, 354 105
             Z"
          fill="url(#silver)"/>

    <!-- Center water-drop blade, tallest -->
    <path d="M 256 60
             C 295 150, 322 215, 322 262
             C 322 308, 294 340, 256 340
             C 218 340, 190 308, 190 262
             C 190 215, 217 150, 256 60 Z"
          fill="url(#silver)"/>
    <path d="M 256 60
             C 295 150, 322 215, 322 262
             C 322 308, 294 340, 256 340
             C 218 340, 190 308, 190 262
             C 190 215, 217 150, 256 60 Z"
          fill="url(#dropShine)"/>

    <!-- Gold binding band wrapping all blade bases -->
    <rect x="138" y="332" width="236" height="36" rx="10" fill="url(#gold)"/>
    <!-- Highlight bevel on top of binding -->
    <rect x="138" y="334" width="236" height="6" fill="#FFFFFF" opacity="0.4"/>
    <!-- Shadow bevel under binding -->
    <rect x="138" y="362" width="236" height="4" fill="#000000" opacity="0.2"/>
    <!-- Two ornamental rivets -->
    <circle cx="172" cy="350" r="4" fill="#78350F"/>
    <circle cx="340" cy="350" r="4" fill="#78350F"/>

    <!-- Handle: clean taper to a point -->
    <path d="M 232 368
             L 280 368
             L 274 432
             L 256 452
             L 238 432 Z"
          fill="url(#silver)"/>
  </g>
</svg>
