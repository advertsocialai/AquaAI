<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <radialGradient id="dropShine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- White water drop centered, large enough to read at small sizes -->
  <path
    d="M256 100
       C 340 215, 380 290, 380 340
       C 380 405, 324 450, 256 450
       C 188 450, 132 405, 132 340
       C 132 290, 172 215, 256 100 Z"
    fill="#FFFFFF"/>
  <!-- Subtle highlight on the drop -->
  <path
    d="M256 100
       C 340 215, 380 290, 380 340
       C 380 405, 324 450, 256 450
       C 188 450, 132 405, 132 340
       C 132 290, 172 215, 256 100 Z"
    fill="url(#dropShine)"/>
</svg>
