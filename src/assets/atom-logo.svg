<?xml version="1.0" encoding="UTF-8"?>
<!-- AquaRudra logo — trishul with water-drop centre prong.
     Drawn on transparent background so it works on both dark + light
     surfaces in the header/footer. Filename kept as atom-logo.svg
     to avoid a search & replace across imports. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Left spear -->
  <path d="M 155 110 C 122 190, 140 280, 178 332 L 208 332 C 196 260, 188 180, 158 105 Z" fill="currentColor"/>

  <!-- Right spear -->
  <path d="M 357 110 C 390 190, 372 280, 334 332 L 304 332 C 316 260, 324 180, 354 105 Z" fill="currentColor"/>

  <!-- Center drop -->
  <path d="M 256 60 C 295 150, 322 215, 322 262 C 322 308, 294 340, 256 340 C 218 340, 190 308, 190 262 C 190 215, 217 150, 256 60 Z" fill="currentColor"/>

  <!-- Gold binding -->
  <rect x="138" y="332" width="236" height="36" rx="10" fill="url(#gold)"/>
  <circle cx="172" cy="350" r="4" fill="#78350F"/>
  <circle cx="340" cy="350" r="4" fill="#78350F"/>

  <!-- Handle -->
  <path d="M 232 368 L 280 368 L 274 432 L 256 452 L 238 432 Z" fill="currentColor"/>
</svg>
