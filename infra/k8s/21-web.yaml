apiVersion: apps/v1
kind: Deployment
metadata:
  name: aquai-web
  namespace: aquai
  labels: { app: aquai-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: aquai-web }
  template:
    metadata:
      labels: { app: aquai-web }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: web
          image: REPLACE_WITH_ECR/aquai/web:latest
          imagePullPolicy: Always
          ports:
            - { containerPort: 80, name: http }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aquai-web
  namespace: aquai
spec:
  selector: { app: aquai-web }
  ports:
    - { port: 80, targetPort: http }
