# AWS Load Balancer Controller ingress with TLS via cert-manager.
# Replace host names with your real domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aquai
  namespace: aquai
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - aquai.in
        - www.aquai.in
        - api.aquai.in
      secretName: aquai-tls
  rules:
    - host: api.aquai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aquai-backend
                port: { number: 80 }
    - host: aquai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aquai-web
                port: { number: 80 }
    - host: www.aquai.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aquai-web
                port: { number: 80 }
