name: Deploy backend → ECR → App Runner

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: aquaai-backend
  APPRUNNER_SERVICE: aquaai-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-uri: ${{ steps.tag.outputs.image-uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: tag
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA::7}"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"
          docker build -t "$IMAGE_URI" -t "$LATEST_URI" ./backend
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Trigger App Runner deploy (if service exists)
        env:
          IMAGE_URI: ${{ steps.tag.outputs.image-uri }}
        run: |
          ARN=$(aws apprunner list-services --region "$AWS_REGION" \
            --query "ServiceSummaryList[?ServiceName=='$APPRUNNER_SERVICE'].ServiceArn" \
            --output text)
          if [ -n "$ARN" ]; then
            echo "Triggering deploy on $ARN"
            aws apprunner start-deployment --service-arn "$ARN" --region "$AWS_REGION"
          else
            echo "App Runner service not yet created — skipping deploy trigger."
            echo "Run \`aws apprunner create-service\` after this workflow completes."
          fi
