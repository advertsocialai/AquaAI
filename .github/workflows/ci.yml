name: CI

on:
  push:
    branches: [main, acqua-ai]
  pull_request:

# A newer push to the same ref cancels older in-flight runs (frees runners).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web · lint · type-check · build · coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint --if-present
      - name: TypeScript
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Build
        run: npm run build
      - name: Unit tests + coverage
        run: npm run test:coverage
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/coverage-summary.json
          if-no-files-found: warn

  e2e:
    name: E2E · smoke · performance (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke + performance specs
        # The required gate runs the stable smoke + performance specs
        # (chromium). The broader route/flow/dashboard specs (npm run
        # e2e:full) are kept in-repo but are being reconciled to the
        # current UI, so they don't block merges yet.
        run: npm run e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  backend:
    name: Backend · ruff · pytest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app || true
      - name: Test (pytest + coverage)
        working-directory: backend
        run: pytest -q --cov=app --cov-report=json:coverage.json --cov-report=term-missing
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.json
          if-no-files-found: warn

  coverage-report:
    name: Coverage · merge dashboard data
    runs-on: ubuntu-latest
    needs: [web, backend]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: coverage
        continue-on-error: true
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend
        continue-on-error: true
      - name: Merge coverage into dashboard report
        run: node scripts/collect-coverage.mjs || true
      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/data/coverageReport.json
          if-no-files-found: warn

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [web, backend, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web image
        run: docker build -t aquai/web:${{ github.sha }} .
      - name: Build backend image
        run: docker build -t aquai/backend:${{ github.sha }} ./backend
