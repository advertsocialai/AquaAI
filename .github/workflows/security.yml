name: Security

on:
  push:
    branches: [main, acqua-ai]
  schedule:
    - cron: "0 4 * * 1"   # weekly Monday 4 AM IST
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm · vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci --no-audit --no-fund
      - name: npm audit (high severity)
        run: npm audit --omit=dev --audit-level=high || true
      - name: Snyk scan
        if: env.SNYK_TOKEN != ''
        env: { SNYK_TOKEN: "${{ secrets.SNYK_TOKEN }}" }
        run: |
          npx -y snyk@latest test --severity-threshold=high --json > snyk.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk.json
          if-no-files-found: ignore

  python-audit:
    name: pip · vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt --strict || true

  codeql:
    name: CodeQL (JavaScript/TypeScript + Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: "${{ matrix.language }}" }
      - uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy · container scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t aquai/backend:scan ./backend
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aquai/backend:scan
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table
