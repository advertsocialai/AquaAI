name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'API base URL the APK should call'
        required: false
        default: 'https://api.aquarudra.com/api/v1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install Flutter deps
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK (prod)
        working-directory: mobile
        run: |
          API_BASE="${{ github.event.inputs.api_base || 'https://api.aquarudra.com/api/v1' }}"
          echo "Building APK with API_BASE=$API_BASE"
          flutter build apk --release \
            --dart-define=API_BASE="$API_BASE" \
            --split-per-abi

      - name: Build debug APK (dev — talks to localhost:8000)
        working-directory: mobile
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE=http://10.0.2.2:8000/api/v1

      - name: List built APKs
        working-directory: mobile
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload release APKs (prod, split per ABI)
        uses: actions/upload-artifact@v4
        with:
          name: aquaai-android-release
          path: mobile/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30

      - name: Upload debug APK (dev)
        uses: actions/upload-artifact@v4
        with:
          name: aquaai-android-debug
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
