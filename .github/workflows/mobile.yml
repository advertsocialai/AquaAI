name: Mobile · Flutter

on:
  push:
    branches: [main, acqua-ai]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.x", channel: stable, cache: true }
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze --no-fatal-warnings
      - run: flutter test --no-pub --reporter expanded

  build-android:
    name: Build · Android AAB
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    defaults: { run: { working-directory: mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.x", channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter build appbundle --release --dart-define=API_BASE=${{ secrets.API_BASE || 'https://api.aquai.in/api/v1' }}
      - uses: actions/upload-artifact@v4
        with:
          name: aquaai-android-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore

  build-ios:
    name: Build · iOS (debug-only on CI)
    runs-on: macos-14
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    defaults: { run: { working-directory: mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "3.22.x", channel: stable, cache: true }
      - run: flutter pub get
      # CI build is unsigned. Signed App Store builds run on a dev machine
      # with the provisioning profile installed, or via Fastlane Match.
      - run: flutter build ios --release --no-codesign --dart-define=API_BASE=${{ secrets.API_BASE || 'https://api.aquai.in/api/v1' }}
