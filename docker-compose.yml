version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: aquai
      POSTGRES_PASSWORD: aquai_dev
      POSTGRES_DB: aquai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquai -d aquai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://aquai:aquai_dev@postgres:5432/aquai
      REDIS_URL: redis://redis:6379/0
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://localhost:8000/api/v1
    ports:
      - "5173:80"

volumes:
  pgdata:
  backend-uploads:
